server:
    port: 8085
    servlet:
      context-path: /idm

spring:
  application:
    name: intelligent-document-management
  threads:
    virtual:
      enabled: true
  datasource: #This is needed because docker compose is not able to detect the database if we are using custom docker images
    url: jdbc:postgresql://localhost:5434/doc_management_db?currentSchema=documentcontent
    username: postgres
    password: toor
  sql:
    init:
      mode: always
      schema-locations: classpath:db/init/schema.sql
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
      default_schema: documentcontent
    show-sql: true

  liquibase:
    change-log: classpath:db/changelog/DocumentContent-DOC_MANAGEMENT_DB/changelog-master.xml
    default-schema: documentcontent

  docker:
    compose:
      skip:
        in-tests: false
      enabled: true
      file: classpath:docker/docker-compose.yml

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/intelligent-content-management

  elasticsearch:
    uris: http://localhost:9200

aiServiceClient:
  url: http://localhost:8086
  path: /AiServiceClient
  version: v1
  timeout: 10000

document:
  extraction:
    engine: tika

elastic:
  index:
    name: document
    type: _doc
  bulk:
    size: 100
  scroll:
    timeout: 1m
  max:
    result: 10000

spring-doc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    filter: true
    operations-sorter: alpha
  api-docs.path: /v3/rest-api-docs

logging:
  level:
    org:
      springframework:
        web: DEBUG
        data: DEBUG
